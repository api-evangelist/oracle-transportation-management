naftiko: 1.0.0-alpha2
info:
  label: Oracle Transportation Management Business Object Resources REST API — Locations
  description: 'Oracle Transportation Management Business Object Resources REST API — Locations. 1 operations. Lead operation:
    List locations. Self-contained Naftiko capability covering one Oracle Transportation Management business surface.'
  tags:
  - Oracle Transportation Management
  - Locations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_TRANSPORTATION_MANAGEMENT_API_KEY: ORACLE_TRANSPORTATION_MANAGEMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: oracle-otm-business-objects-locations
    baseUri: https://{host}/GC3/glog.integration.servlet.WMServlet/otm/rest/v1
    description: Oracle Transportation Management Business Object Resources REST API — Locations business capability. Self-contained,
      no shared references.
    resources:
    - name: locations
      path: /locations
      operations:
      - name: listlocations
        method: GET
        description: List locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: locationType
          in: query
          type: string
        - name: country
          in: query
          type: string
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.ORACLE_TRANSPORTATION_MANAGEMENT_API_KEY}}'
  exposes:
  - type: rest
    namespace: oracle-otm-business-objects-locations-rest
    port: 8080
    description: REST adapter for Oracle Transportation Management Business Object Resources REST API — Locations. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/locations
      name: locations
      description: REST surface for locations.
      operations:
      - method: GET
        name: listlocations
        description: List locations
        call: oracle-otm-business-objects-locations.listlocations
        with:
          locationType: rest.locationType
          country: rest.country
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oracle-otm-business-objects-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Transportation Management Business Object Resources REST API — Locations. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-locations
      description: List locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oracle-otm-business-objects-locations.listlocations
      with:
        locationType: tools.locationType
        country: tools.country
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
