aid: oracle-transportation-management
name: Oracle Transportation Management
description: >-
  Oracle Transportation Management (OTM) is a logistics platform delivered as part of Oracle Fusion Cloud Transportation
  and Global Trade Management. OTM APIs provide programmatic access to shipment orders, carriers, lanes, rates,
  transportation plans, and logistics data, plus table-centric data export for integration with reporting, analytics,
  and data warehouse systems.
